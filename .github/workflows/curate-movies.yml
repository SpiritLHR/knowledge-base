name: Curate Weekly Movies

on:
  schedule:
    # Every Monday 09:00 Beijing time (UTC+8 = 01:00 UTC)
    - cron: "23 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run curate-movies
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit and push curation changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --staged --quiet && ! git ls-files --others --exclude-standard | grep -q 'src/content/movies/recommend/'; then
            echo "No curation changes, skipping."
            exit 0
          fi

          git add src/content/movies/recommend/
          git commit -m "auto: weekly movie curation $(date +%Y-%m-%d)"
          git push
